# Nginx reverse proxy for the Bolão 2026 API (host-level).
# Cloudflare (Full strict) terminates public TLS and proxies to this server.
# Place under /etc/nginx/sites-available/ and symlink to sites-enabled/.

upstream bolao_api {
    server 127.0.0.1:3000;
    keepalive 32;
}

server {
    listen 80;
    server_name api-bolao2026.kratinho.com.br;

    # Recommended: terminate TLS here too (Cloudflare Full strict needs a valid
    # origin cert — e.g. Cloudflare Origin Certificate). Add listen 443 ssl; +
    # ssl_certificate / ssl_certificate_key, then redirect 80→443.

    client_max_body_size 10m; # team/tournament logo uploads

    location / {
        proxy_pass http://bolao_api;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";
        proxy_read_timeout 60s;
    }
}
