# Nginx reverse proxy for the Cravei API (host-level).
# Cloudflare (Flexible SSL) terminates public TLS and proxies to this server
# over plain HTTP:80 — do NOT add an 80→443 redirect here (it would loop).
# Place under /etc/nginx/sites-available/ and symlink to sites-enabled/.

upstream bolao_api {
    server 127.0.0.1:3000;
    keepalive 32;
}

server {
    listen 80;
    server_name api.cravei.app;

    # TLS is handled at the Cloudflare edge (Flexible). Origin stays HTTP:80.
    # To harden later, switch CF to Full (strict) and add a Cloudflare Origin
    # Certificate here (listen 443 ssl; ssl_certificate/_key) — not needed now.

    client_max_body_size 10m; # team/tournament logo uploads

    # SSE realtime stream: no buffering, long-lived connection.
    location /api/events {
        proxy_pass http://bolao_api;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        chunked_transfer_encoding off;
    }

    location / {
        proxy_pass http://bolao_api;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";
        proxy_read_timeout 60s;
    }
}
